  unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;
}
/* latin */

  font-weight: 800;
  font-display: swap;

  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;

<style>/* ============================================================
   DeBarrio — Tokens del sistema de diseño
   Modo claro, alto contraste, mobile-first.
   Variables manejables por Tweaks (ver data-* en :root).
   ============================================================ */

:root {
  /* ---- Marca ---- */
  --verde-900: #0d3d20;
  --verde-800: #114d2a;
  --verde-700: #156234;
  --verde-600: #1b7a3d;   /* PRIMARY · verde cancha */
  --verde-500: #239149;
  --verde-400: #38ac61;
  --verde-200: #b7e3c6;
  --verde-100: #dcf3e4;
  --verde-50:  #eef9f2;

  --naranjo-700: #c44e12;
  --naranjo-600: #e2570f;
  --naranjo-500: #f2641a;  /* ACCENT · organizador / CTA secundario */
  --naranjo-400: #f7864a;
  --naranjo-200: #fcd6c0;
  --naranjo-100: #fde7da;
  --naranjo-50:  #fef3ec;

  /* ---- Neutros cálidos ---- */
  --tinta:    #19211c;   /* texto principal (negro cálido verdoso) */
  --tinta-70: #45504a;   /* texto secundario */
  --tinta-50: #6c766f;   /* texto terciario / placeholder */
  --linea:    #e3e7e3;   /* bordes */
  --linea-fuerte: #cfd6d0;
  --panel:    #ffffff;   /* superficies */
  --lienzo:   #f5f6f3;   /* fondo app (off-white cálido) */
  --lienzo-2: #eceee9;

  /* ---- Estados de cupo (color + se acompañan SIEMPRE de ícono+texto) ---- */
  --st-libre-bg:     #ffffff;
  --st-libre-bd:     #cfd6d0;
  --st-libre-fg:     #45504a;

  --st-pend-bg:      #fff6e2;
  --st-pend-bd:      #f0c350;
  --st-pend-fg:      #9a6a00;
  --st-pend-solid:   #e8a317;

  --st-pago-bg:      #1b7a3d;
  --st-pago-bd:      #156234;
  --st-pago-fg:      #ffffff;

  --st-libe-bg:      #eef3fb;
  --st-libe-bd:      #9db8e0;
  --st-libe-fg:      #2f5aa0;

  /* ---- Semánticos app ---- */
  --primary:    var(--verde-600);
  --primary-ink: #ffffff;
  --accent:     var(--naranjo-500);
  --ok:         var(--verde-600);
  --warn:       var(--st-pend-solid);
  --danger:     #d23b3b;
  --info:       #2f5aa0;

  /* ---- Tipografía ---- */
  --font-ui: "Figtree", system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
  --font-num: "Figtree", system-ui, sans-serif;
  --fw-reg: 450;
  --fw-med: 550;
  --fw-semi: 650;
  --fw-bold: 780;

  /* escala fluida (crece en desktop) */
  --fs-3xl: clamp(28px, 4.2vw, 44px);
  --fs-2xl: clamp(23px, 3.2vw, 34px);
  --fs-xl:  clamp(20px, 2.4vw, 27px);
  --fs-lg:  clamp(18px, 1.7vw, 21px);
  --fs-md:  clamp(15px, 1.2vw, 17px);
  --fs-sm:  clamp(13px, 1.0vw, 14px);
  --fs-xs:  12px;
  --lh-tight: 1.08;
  --lh-snug: 1.25;
  --lh-body: 1.5;

  /* ---- Espaciado (base 4) ---- */
  --s-1: 4px;  --s-2: 8px;  --s-3: 12px; --s-4: 16px;
  --s-5: 20px; --s-6: 24px; --s-7: 32px; --s-8: 40px;
  --s-9: 48px; --s-10: 64px; --s-12: 80px;

  /* ---- Radios ---- */
  --r-sm: 8px;
  --r-md: 12px;
  --r-lg: 16px;
  --r-xl: 22px;
  --r-pill: 999px;

  /* ---- Sombras (suaves, modo claro) ---- */
  --sh-sm: 0 1px 2px rgba(20,40,28,.06), 0 1px 1px rgba(20,40,28,.04);
  --sh-md: 0 2px 6px rgba(20,40,28,.07), 0 6px 18px rgba(20,40,28,.06);
  --sh-lg: 0 8px 28px rgba(20,40,28,.12), 0 2px 8px rgba(20,40,28,.06);
  --sh-up: 0 -6px 20px rgba(20,40,28,.08);
  --ring: 0 0 0 3px rgba(27,122,61,.28);
  --ring-acc: 0 0 0 3px rgba(242,100,26,.3);

  /* ---- Touch ---- */
  --tap: 48px;       /* área táctil mínima móvil */
  --tap-lg: 56px;
}

/* ---- Breakpoints (referencia) ----
   sm  ≥ 480px   teléfono grande
   md  ≥ 768px   tablet
   lg  ≥ 1024px  escritorio (dos zonas + sidebar)
   xl  ≥ 1280px  escritorio amplio
*/

* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; }
body {
  font-family: var(--font-ui);
  color: var(--tinta);
  background: var(--lienzo);
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
  font-weight: var(--fw-reg);
}
button { font-family: inherit; }
::selection { background: var(--verde-200); }

/* números tabulares para grilla y montos */
.num { font-variant-numeric: tabular-nums; font-feature-settings: "tnum" 1; }

/* utilitario screen-reader */
.sr-only {
  position:absolute; width:1px; height:1px; padding:0; margin:-1px;
  overflow:hidden; clip:rect(0,0,0,0); white-space:nowrap; border:0;
}

@media (prefers-reduced-motion: reduce) {
  * { animation-duration: .001ms !important; transition-duration: .001ms !important; }
}
</style>
<style>/* ============================================================
   DeBarrio — componentes
   Variaciones por Tweaks vía atributos en [data-app]:
     data-grid    = rounded | circle | ticket
     data-density = compact | regular | comfy
     data-card    = solid | outline | photo
     data-nav     = labels | icons | pill
   ============================================================ */

/* ---------- mobile/touch optimizations (iOS + Android) ---------- */
button, a, .spot, .chip, .nav-item, .icon-btn, .match-card, .side-link, .copy-row, .hf-tile {
  -webkit-tap-highlight-color: transparent;
  touch-action: manipulation;
}
button { -webkit-touch-callout: none; -webkit-user-select: none; user-select: none; }
/* evita auto-zoom de iOS Safari al focusear inputs (<16px gatilla zoom) */
.input { font-size: 16px; }
@media (min-width: 600px) { .input { font-size: var(--fs-md); } }
/* sheets: que el scroll no haga rubber-band al body en iOS */
.sheet { overscroll-behavior: contain; -webkit-overflow-scrolling: touch; }

/* ---------- easing premium unificado ---------- */
:root {
  --ease-out: cubic-bezier(.2, .8, .2, 1);
  --ease-in: cubic-bezier(.4, 0, .9, .6);
  --ease-spring: cubic-bezier(.16, 1.1, .3, 1);
}
html { scroll-behavior: smooth; }

/* transición de entrada al cambiar de vista/tab ("al deslizar") */
.content-enter { animation: contentSlideIn .38s var(--ease-out) both; }
@keyframes contentSlideIn {
  0%   { opacity: 0; transform: translateY(10px); }
  100% { opacity: 1; transform: none; }
}
@media (prefers-reduced-motion: reduce) {
  .content-enter { animation: none; }
}

/* ---------- layout app shell ---------- */
.app { min-height: 100dvh; background: var(--lienzo); }

/* App canvas máximo en desktop */
.shell { display: flex; min-height: 100dvh; }

/* Sidebar (desktop) */
.sidebar {
  display: none;
  position: sticky; top: 0; align-self: flex-start;
  width: 248px; height: 100dvh;
  background: var(--panel);
  border-right: 1px solid var(--linea);
  padding: var(--s-5) var(--s-4);
  flex-direction: column; gap: var(--s-2);
}
.brand { display:flex; align-items:center; gap:10px; padding: var(--s-2) var(--s-2) var(--s-5); }
.brand-mark {
  width:38px; height:38px; border-radius:11px; flex:0 0 auto;
  background: var(--verde-600); color:#fff; display:grid; place-items:center;
  box-shadow: var(--sh-sm);
}
.brand-name { font-weight: var(--fw-bold); font-size:19px; letter-spacing:-.01em; }
.brand-name b { color: var(--naranjo-500); }

.side-link {
  display:flex; align-items:center; gap:12px;
  padding: 12px 14px; border-radius: var(--r-md);
  color: var(--tinta-70); font-weight: var(--fw-med); font-size: var(--fs-md);
  cursor:pointer; border:0; background:transparent; width:100%; text-align:left;
  transition: background .22s var(--ease-out), color .22s var(--ease-out), padding-left .22s var(--ease-out), transform .14s var(--ease-out);
}
.side-link:hover { background: var(--lienzo); color: var(--tinta); padding-left: 18px; }
.side-link:active { transform: scale(.985); }
.side-link[aria-current="page"] { background: var(--verde-50); color: var(--verde-700); }
.side-link[aria-current="page"] svg { color: var(--verde-600); }
.side-foot { margin-top:auto; }

/* Contenido */
.content { flex:1 1 auto; min-width:0; display:flex; flex-direction:column; }
.content-pad { width:100%; max-width: 1120px; margin:0 auto; padding: var(--s-4); }
.with-bottomnav { padding-bottom: calc(var(--tap-lg) + env(safe-area-inset-bottom) + 22px); }

/* Topbar móvil */
.topbar {
  position: sticky; top:0; z-index: 30;
  display:flex; align-items:center; gap: var(--s-3);
  padding: 12px var(--s-4); min-height: 58px;
  background: color-mix(in srgb, var(--lienzo) 86%, transparent);
  backdrop-filter: blur(10px);
  border-bottom: 1px solid var(--linea);
}
.topbar .brand { padding:0; }
.topbar-spacer { flex:1; }
.icon-btn {
  width: var(--tap); height: var(--tap); min-width: var(--tap);
  display:grid; place-items:center; border-radius: var(--r-md);
  background: var(--panel); border:1px solid var(--linea); color: var(--tinta-70);
  cursor:pointer; box-shadow: var(--sh-sm);
  transition: background .2s var(--ease-out), border-color .2s var(--ease-out), color .2s var(--ease-out), transform .12s var(--ease-out), box-shadow .2s var(--ease-out);
}
.icon-btn:hover { color: var(--tinta); border-color: var(--linea-fuerte); box-shadow: var(--sh-md); }
.icon-btn:active { transform: scale(.92); transition-duration: .07s; }

/* ---------- bottom nav (móvil) ---------- */
.bottomnav {
  position: fixed; left:0; right:0; bottom:0; z-index: 40;
  display:flex; gap:2px; padding: 6px 8px calc(6px + env(safe-area-inset-bottom));
  background: color-mix(in srgb, var(--panel) 94%, transparent);
  backdrop-filter: blur(12px);
  border-top: 1px solid var(--linea); box-shadow: var(--sh-up);
}
.nav-item {
  flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center;
  gap:3px; min-height: var(--tap-lg); border:0; background:transparent; cursor:pointer;
  color: var(--tinta-50); font-size: 11px; font-weight: var(--fw-semi); border-radius: var(--r-md);
  padding: 4px 2px;
  transition: color .22s var(--ease-out);
}
.nav-item span { line-height:1; }
.nav-item[aria-current="page"] { color: var(--verde-700); }
.nav-item .nav-dot {
  width: 100%; max-width: 46px; height: 30px; display:grid; place-items:center;
  border-radius: var(--r-pill);
  transition: background .28s var(--ease-out), transform .28s var(--ease-spring), color .22s var(--ease-out);
}
.nav-item:active .nav-dot { transform: scale(.9); transition-duration: .08s; }
.nav-item[aria-current="page"] .nav-dot { background: var(--verde-100); transform: scale(1.06); }
[data-nav="icons"] .nav-item span.lbl { display:none; }
[data-nav="pill"] .nav-item[aria-current="page"] .nav-dot { background: var(--verde-600); color:#fff; }

/* fab organizador */
.fab-org {
  position: fixed; right: 16px; z-index: 41;
  bottom: calc(var(--tap-lg) + env(safe-area-inset-bottom) + 18px);
  height: 52px; padding: 0 20px; border-radius: var(--r-pill);
  background: var(--naranjo-500); color:#fff; border:0; cursor:pointer;
  display:flex; align-items:center; gap:8px; font-weight: var(--fw-bold);
  box-shadow: 0 6px 18px rgba(242,100,26,.4);
}

/* ---------- buttons ---------- */
.btn {
  display:inline-flex; align-items:center; justify-content:center; gap:9px;
  min-height: var(--tap); padding: 0 var(--s-5); border-radius: var(--r-md);
  font-weight: var(--fw-bold); font-size: var(--fs-md); cursor:pointer;
  border:1.5px solid transparent;
  transition:
    transform .14s var(--ease-out),
    background .22s var(--ease-out),
    background-color .22s var(--ease-out),
    box-shadow .22s var(--ease-out),
    border-color .22s var(--ease-out),
    color .22s var(--ease-out),
    filter .22s var(--ease-out);
  line-height:1; white-space:nowrap;
}
.btn:active { transform: scale(.97); transition-duration: .08s; }
.btn:focus-visible { outline:none; box-shadow: var(--ring); }
.btn-lg { min-height: var(--tap-lg); padding: 0 var(--s-6); font-size: var(--fs-lg); border-radius: var(--r-lg); }
.btn-block { width:100%; }
.btn-primary {
  background: linear-gradient(180deg, var(--verde-500), var(--verde-600) 65%);
  color:#fff;
  box-shadow:
    inset 0 1px 0 rgba(255,255,255,.18),
    0 1px 2px rgba(20,40,28,.08),
    0 8px 18px -8px rgba(27,122,61,.55);
}
.btn-primary:hover {
  background: linear-gradient(180deg, var(--verde-600), var(--verde-700) 65%);
  box-shadow:
    inset 0 1px 0 rgba(255,255,255,.20),
    0 1px 2px rgba(20,40,28,.10),
    0 10px 22px -8px rgba(27,122,61,.6);
}
.btn-primary:active { filter: brightness(.97); }
.btn-accent  {
  background: linear-gradient(180deg, var(--naranjo-400), var(--naranjo-500) 65%);
  color:#fff;
  box-shadow:
    inset 0 1px 0 rgba(255,255,255,.20),
    0 1px 2px rgba(20,40,28,.08),
    0 8px 18px -8px rgba(242,100,26,.55);
}
.btn-accent:hover {
  background: linear-gradient(180deg, var(--naranjo-500), var(--naranjo-600) 65%);
  box-shadow:
    inset 0 1px 0 rgba(255,255,255,.22),
    0 1px 2px rgba(20,40,28,.10),
    0 10px 22px -8px rgba(242,100,26,.6);
}
.btn-accent:focus-visible { box-shadow: var(--ring-acc); }
.btn-accent:active { filter: brightness(.97); }
.btn-ghost   { background: var(--panel); color: var(--tinta); border-color: var(--linea-fuerte); }
.btn-ghost:hover { border-color: var(--tinta-50); box-shadow: var(--sh-sm); }
.btn-soft    { background: var(--verde-50); color: var(--verde-700); }
.btn-soft:hover { background: var(--verde-100); }
.btn-quiet   { background: transparent; color: var(--tinta-70); }
.btn-quiet:hover { background: var(--lienzo-2); }
.btn[disabled] { opacity:.5; cursor:not-allowed; }
.btn[disabled]:active { transform: none; }
.btn-danger { background: #fdeaea; color: var(--danger); }

/* ---------- chips / pills ---------- */
.chip {
  display:inline-flex; align-items:center; gap:6px; height:34px; padding:0 13px;
  border-radius: var(--r-pill); font-size: var(--fs-sm); font-weight: var(--fw-semi);
  background: var(--panel); border:1px solid var(--linea); color: var(--tinta-70); cursor:pointer;
  white-space:nowrap;
  transition: background .24s var(--ease-out), border-color .24s var(--ease-out), color .2s var(--ease-out), transform .14s var(--ease-out), box-shadow .22s var(--ease-out);
}
.chip:hover { border-color: var(--linea-fuerte); }
.chip:active { transform: scale(.96); transition-duration: .08s; }
.chip[aria-pressed="true"] {
  background: var(--verde-600); border-color: var(--verde-600); color:#fff;
  box-shadow: 0 6px 14px -6px rgba(27,122,61,.55);
}
.chip-row { display:flex; gap:8px; overflow-x:auto; padding-bottom:4px; -webkit-overflow-scrolling:touch; }
.chip-row::-webkit-scrollbar { display:none; }

.tag {
  display:inline-flex; align-items:center; gap:5px; padding:3px 9px; border-radius: var(--r-pill);
  font-size:12px; font-weight: var(--fw-bold); line-height:1.4; white-space:nowrap; flex:0 0 auto;
}
.tag-verde { background: var(--verde-100); color: var(--verde-700); }
.tag-naranjo { background: var(--naranjo-100); color: var(--naranjo-700); }
.tag-info { background: var(--st-libe-bg); color: var(--st-libe-fg); }
.tag-warn { background: var(--st-pend-bg); color: var(--st-pend-fg); }
.tag-muted { background: var(--lienzo-2); color: var(--tinta-70); }

/* ---------- avatar ---------- */
.av {
  border-radius: 50%; display:grid; place-items:center; color:#fff;
  font-weight: var(--fw-bold); flex:0 0 auto; letter-spacing:.01em;
}

/* ---------- card base ---------- */
.card {
  background: var(--panel); border:1px solid var(--linea); border-radius: var(--r-lg);
  box-shadow: var(--sh-sm);
}
.card-pad { padding: var(--s-5); }

/* ---------- match card ---------- */
.match-card {
  background: var(--panel); border:1px solid var(--linea); border-radius: var(--r-lg);
  box-shadow: var(--sh-sm); overflow:hidden; cursor:pointer; text-align:left; width:100%;
  display:flex; flex-direction:column;
  transition:
    box-shadow .26s var(--ease-out),
    transform .18s var(--ease-out),
    border-color .22s var(--ease-out);
}
.match-card:hover { box-shadow: var(--sh-md); border-color: var(--linea-fuerte); transform: translateY(-2px); }
.match-card:active { transform: translateY(0) scale(.995); transition-duration: .08s; }
.match-card[aria-current="true"] { border-color: var(--verde-600); box-shadow: 0 0 0 2px var(--verde-200), var(--sh-md); transform: translateY(-1px); }
.mc-top {
  position:relative; padding: var(--s-4) var(--s-5);
  display:flex; gap: var(--s-3); align-items:flex-start;
}
[data-card="solid"] .mc-top { background: var(--verde-50); border-bottom:1px solid var(--verde-100); }
[data-card="photo"] .mc-top {
  color:#fff; min-height: 96px; align-items:flex-end;
  background:
    linear-gradient(180deg, rgba(13,61,32,.05), rgba(13,61,32,.78)),
    repeating-linear-gradient(135deg, #1b7a3d 0 22px, #18713a 22px 44px);
}
[data-card="photo"] .mc-top .mc-sub { color: rgba(255,255,255,.85); }
.mc-date {
  flex:0 0 auto; width:54px; text-align:center; border-radius: var(--r-md);
  background: var(--panel); border:1px solid var(--linea); padding:7px 0; box-shadow: var(--sh-sm);
}
[data-card="photo"] .mc-date { color: var(--tinta); }
.mc-date .d { font-size:20px; font-weight: var(--fw-bold); line-height:1; }
.mc-date .m { font-size:11px; font-weight: var(--fw-semi); text-transform:uppercase; color: var(--tinta-50); letter-spacing:.04em; }
.mc-title { font-size: var(--fs-lg); font-weight: var(--fw-bold); letter-spacing:-.01em; line-height:1.15; }
.mc-sub { font-size: var(--fs-sm); color: var(--tinta-70); display:flex; align-items:center; gap:6px; margin-top:4px; flex-wrap:wrap; }
.mc-body { padding: var(--s-4) var(--s-5) var(--s-5); display:flex; flex-direction:column; gap: var(--s-3); }
.mc-meta { display:flex; align-items:center; gap: var(--s-4); flex-wrap:wrap; color: var(--tinta-70); font-size: var(--fs-sm); }
.mc-meta b { color: var(--tinta); font-weight: var(--fw-bold); }

/* ---------- progreso "X de Y pagados" ---------- */
.prog { display:flex; flex-direction:column; gap:7px; }
.prog-head { display:flex; align-items:baseline; justify-content:space-between; gap:8px; }
.prog-count { font-weight: var(--fw-bold); font-size: var(--fs-md); white-space: nowrap; transition: transform .35s cubic-bezier(.2,.8,.2,1), color .35s ease; }
.prog-count b { color: var(--verde-600); transition: color .35s ease; }
.prog-count.is-up { animation: progCountBump .7s cubic-bezier(.2,.8,.2,1); }
.prog-count.is-up b { color: var(--verde-500); }
@keyframes progCountBump {
  0%   { transform: translateY(0) scale(1); }
  30%  { transform: translateY(-2px) scale(1.06); }
  100% { transform: translateY(0) scale(1); }
}
.prog-pct { font-size: var(--fs-sm); color: var(--tinta-50); font-weight: var(--fw-semi); }
.prog-track {
  height: 12px; border-radius: var(--r-pill); background: var(--lienzo-2);
  overflow:hidden; display:flex; border:1px solid var(--linea);
}
.prog-seg-pago { background: var(--verde-600); }
.prog-seg-pend { background: repeating-linear-gradient(45deg, var(--st-pend-solid) 0 6px, #f3b53d 6px 12px); }
.prog-track > span { display:block; height:100%; transition: width .7s cubic-bezier(.2,.8,.2,1); }
.prog-legend { display:flex; gap: var(--s-4); flex-wrap:wrap; font-size:12px; color: var(--tinta-70); }
.prog-legend i { width:10px; height:10px; border-radius:3px; display:inline-block; margin-right:5px; vertical-align:-1px; }

/* ============================================================
   GRILLA DE CUPOS  ★
   ============================================================ */
.grid-wrap { display:flex; flex-direction:column; gap: var(--s-4); }
.spot-grid {
  display:grid; gap: 10px;
  grid-template-columns: repeat(auto-fill, minmax(72px, 1fr));
}
[data-density="compact"] .spot-grid { gap:7px; grid-template-columns: repeat(auto-fill, minmax(60px,1fr)); }
[data-density="comfy"]   .spot-grid { gap:14px; grid-template-columns: repeat(auto-fill, minmax(86px,1fr)); }

/* tile */
.spot {
  position:relative; aspect-ratio: 1 / 1; min-height: 64px;
  display:flex; flex-direction:column; align-items:center; justify-content:center; gap:2px;
  border-radius: var(--r-md); border:1.5px solid var(--st-libre-bd);
  background: var(--st-libre-bg); color: var(--st-libre-fg);
  cursor:pointer; padding:6px 4px; text-align:center;
  transition:
    transform .14s var(--ease-out),
    box-shadow .22s var(--ease-out),
    border-color .25s var(--ease-out),
    background-color .28s var(--ease-out),
    color .25s var(--ease-out);
}
[data-grid="circle"] .spot { border-radius: 50%; }
[data-grid="ticket"] .spot { border-radius: 6px; }
[data-grid="ticket"] .spot::before,
[data-grid="ticket"] .spot::after {
  content:""; position:absolute; width:12px; height:12px; border-radius:50%;
  background: var(--lienzo); border:1.5px solid var(--st-libre-bd);
  top:50%; transform: translateY(-50%);
}
[data-grid="ticket"] .spot::before { left:-7px; border-right-color: transparent; }
[data-grid="ticket"] .spot::after  { right:-7px; border-left-color: transparent; }
[data-grid="ticket"] .spot { border-style: dashed; }

.spot:hover { box-shadow: var(--sh-md); }
.spot:active { transform: scale(.96); transition-duration: .07s; }
.spot:focus-visible { outline:none; box-shadow: var(--ring); }
.spot-num { font-size: clamp(19px, 2vw, 24px); font-weight: var(--fw-bold); line-height:1; }
.spot-ico { position:absolute; top:6px; right:6px; opacity:.9; }
[data-grid="ticket"] .spot-ico { top:5px; right:8px; }
.spot-lbl { font-size: 10.5px; font-weight: var(--fw-bold); text-transform:uppercase; letter-spacing:.03em; line-height:1; opacity:.95; }
.spot-who { font-size: 10px; font-weight: var(--fw-semi); line-height:1; opacity:.9; white-space:nowrap; overflow:hidden; max-width:100%; text-overflow:ellipsis; }
[data-density="compact"] .spot-lbl, [data-density="compact"] .spot-who { display:none; }
[data-density="compact"] .spot { min-height: 52px; }

/* estados */
.spot.s-pagado { background: var(--st-pago-bg); border-color: var(--st-pago-bd); color: var(--st-pago-fg); }
.spot.s-pendiente { background: var(--st-pend-bg); border-color: var(--st-pend-bd); color: var(--st-pend-fg); }
.spot.s-pendiente { border-style: dashed; }
.spot.s-liberado { background: var(--st-libe-bg); border-color: var(--st-libe-bd); color: var(--st-libe-fg); border-style: dashed; }
.spot.s-libre:hover { border-color: var(--verde-500); color: var(--verde-700); }
.spot.s-liberado:hover { border-color: var(--verde-500); }
.spot.s-mine { box-shadow: 0 0 0 2px var(--naranjo-200); }
.spot.s-mine::after { content:"tú"; }
.spot.is-static { cursor: default; }
.spot.is-static:hover { box-shadow: var(--sh-sm); }

/* ✨ micro-recompensa cuando un cupo pasa a pagado */
.spot.is-just-paid { animation: spotPaidPulse .76s cubic-bezier(.2,.8,.2,1); }
@keyframes spotPaidPulse {
  0%   { transform: scale(1);    box-shadow: 0 0 0 0   rgba(35,145,73,.55), var(--sh-sm); }
  30%  { transform: scale(1.08); box-shadow: 0 0 0 4px rgba(35,145,73,.35), 0 6px 18px rgba(27,122,61,.28); }
  70%  { transform: scale(1);    box-shadow: 0 0 0 10px rgba(35,145,73,.04), var(--sh-md); }
  100% { transform: scale(1);    box-shadow: 0 0 0 14px rgba(35,145,73,0),   var(--sh-sm); }
}

/* mini avatar dentro de tile */
.spot-av { width:18px; height:18px; border-radius:50%; display:grid; place-items:center; font-size:9px; font-weight:var(--fw-bold); color:#fff; }

/* leyenda de estados */
.legend { display:flex; flex-wrap:wrap; gap: var(--s-2) var(--s-4); }
.legend-item { display:flex; align-items:center; gap:7px; font-size: var(--fs-sm); color: var(--tinta-70); font-weight: var(--fw-med); }
.legend-swatch {
  width:26px; height:26px; border-radius:8px; display:grid; place-items:center; flex:0 0 auto;
  border:1.5px solid var(--st-libre-bd); background: var(--st-libre-bg); color: var(--st-libre-fg);
}
.legend-swatch.s-pagado { background: var(--st-pago-bg); border-color: var(--st-pago-bd); color:#fff; }
.legend-swatch.s-pendiente { background: var(--st-pend-bg); border-color: var(--st-pend-bd); color: var(--st-pend-fg); border-style:dashed; }
.legend-swatch.s-liberado { background: var(--st-libe-bg); border-color: var(--st-libe-bd); color: var(--st-libe-fg); border-style:dashed; }

/* ---------- reputación ---------- */
.rep {
  display:inline-flex; align-items:center; gap:7px; padding:5px 11px 5px 8px;
  border-radius: var(--r-pill); font-weight: var(--fw-bold); font-size: var(--fs-sm);
  background: var(--lienzo-2); color: var(--tinta);
}
.rep-dot { width:22px; height:22px; border-radius:50%; display:grid; place-items:center; color:#fff; flex:0 0 auto; }
.rep-sm { font-size:12px; padding:3px 9px 3px 6px; }
.rep-sm .rep-dot { width:18px; height:18px; }

/* ---------- fila confirmar pago (organizador) ---------- */
.pay-row {
  display:flex; align-items:center; gap: var(--s-3); padding: var(--s-3) var(--s-4);
  border:1px solid var(--linea); border-radius: var(--r-md); background: var(--panel);
}
.pay-row + .pay-row { margin-top: 8px; }
.pay-row .grow { flex:1 1 auto; min-width:0; overflow:hidden; }
.pay-name { font-weight: var(--fw-bold); font-size: var(--fs-md); display:flex; align-items:center; gap:8px; min-width:0; }
.pay-name-text { overflow:hidden; text-overflow:ellipsis; white-space:nowrap; min-width:0; }
.pay-name .rep { flex:0 0 auto; }
.pay-meta { font-size:12px; color: var(--tinta-50); margin-top:2px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.pay-actions { display:flex; gap:8px; flex:0 0 auto; }
.pay-row.is-paid { background: var(--verde-50); border-color: var(--verde-100); }

/* ---------- tabla ranking ---------- */
.rank { width:100%; border-collapse:collapse; }
.rank th, .rank td { text-align:left; padding: 12px var(--s-3); border-bottom:1px solid var(--linea); }
.rank th { font-size:12px; text-transform:uppercase; letter-spacing:.04em; color: var(--tinta-50); font-weight: var(--fw-bold); }
.rank td { font-size: var(--fs-md); }
.rank tr:last-child td { border-bottom:0; }
.rank .pos { width:34px; color: var(--tinta-50); font-weight: var(--fw-bold); font-variant-numeric: tabular-nums; }
.rank .who { display:flex; align-items:center; gap:10px; font-weight: var(--fw-semi); }
.rank .num { text-align:right; }
.rank tr.me { background: var(--verde-50); }
.rank tr.debe td { color: var(--tinta); }
.rank .who-name { overflow:hidden; text-overflow:ellipsis; white-space:nowrap; min-width:0; }
.rep-score { display:inline-flex; align-items:center; justify-content:flex-end; gap:7px; font-weight: var(--fw-bold); font-variant-numeric: tabular-nums; white-space:nowrap; }

/* ---------- form fields ---------- */
.field { display:flex; flex-direction:column; gap:7px; }
.field label, .lbl { font-size: var(--fs-sm); font-weight: var(--fw-bold); color: var(--tinta); }
.field .hint { font-size:12px; color: var(--tinta-50); }
.input {
  height: var(--tap); padding: 0 14px; border-radius: var(--r-md);
  border:1.5px solid var(--linea-fuerte); background: var(--panel); font-size: var(--fs-md);
  color: var(--tinta); width:100%; font-family: inherit;
  transition: border-color .22s var(--ease-out), box-shadow .25s var(--ease-out), background-color .22s var(--ease-out);
}
.input:hover { border-color: var(--tinta-50); }
.input:focus { outline:none; border-color: var(--verde-500); box-shadow: var(--ring); }
textarea.input { height:auto; padding:12px 14px; resize:vertical; min-height:88px; line-height:1.5; }

/* ---------- copy field (datos transferencia) ---------- */
.copy-row {
  display:flex; align-items:center; gap: var(--s-3); padding: 12px 14px;
  border:1px solid var(--linea); border-radius: var(--r-md); background: var(--lienzo);
  transition: background .35s ease, border-color .35s ease;
}
.copy-row .k { font-size:12px; color: var(--tinta-50); font-weight: var(--fw-semi); }
.copy-row .v { font-size: var(--fs-md); font-weight: var(--fw-bold); }
.copy-row button { margin-left:auto; }

/* ✨ flash verde al copiar + pop del botón */
.copy-row.is-done {
  animation: copyRowFlash .9s cubic-bezier(.2,.8,.2,1);
}
@keyframes copyRowFlash {
  0%   { background: var(--lienzo);     border-color: var(--linea); }
  18%  { background: var(--verde-100);  border-color: var(--verde-500); box-shadow: 0 0 0 3px rgba(35,145,73,.18); }
  55%  { background: var(--verde-50);   border-color: var(--verde-200); box-shadow: 0 0 0 0 rgba(35,145,73,0); }
  100% { background: var(--lienzo);     border-color: var(--linea);     box-shadow: none; }
}
.btn.is-pop { animation: copyBtnPop .32s cubic-bezier(.2,.8,.2,1); }
@keyframes copyBtnPop {
  0%   { transform: scale(1); }
  45%  { transform: scale(.92); }
  100% { transform: scale(1); }
}

/* ---------- upload comprobante ---------- */
.dropzone {
  border:2px dashed var(--linea-fuerte); border-radius: var(--r-lg); background: var(--lienzo);
  padding: var(--s-7) var(--s-5); text-align:center; cursor:pointer; transition: border-color .15s, background .15s;
  display:flex; flex-direction:column; align-items:center; gap: var(--s-3);
}
.dropzone:hover { border-color: var(--verde-500); background: var(--verde-50); }
.dropzone.has-file { border-style:solid; border-color: var(--verde-500); background: var(--verde-50); }
.thumb {
  width:100%; max-width:280px; border-radius: var(--r-md); overflow:hidden;
  border:1px solid var(--linea); background:#fff;
}

/* ---------- section heads ---------- */
.page-head { display:flex; align-items:flex-end; justify-content:space-between; gap: var(--s-4); margin-bottom: var(--s-4); flex-wrap:wrap; }
.h-xl { font-size: var(--fs-2xl); font-weight: var(--fw-bold); letter-spacing:-.02em; line-height: var(--lh-tight); }
.h-lg { font-size: var(--fs-xl); font-weight: var(--fw-bold); letter-spacing:-.01em; }
.h-sm { font-size: var(--fs-md); font-weight: var(--fw-bold); }
.muted { color: var(--tinta-70); }
.muted-2 { color: var(--tinta-50); }
.eyebrow { font-size:12px; font-weight: var(--fw-bold); text-transform:uppercase; letter-spacing:.08em; color: var(--naranjo-600); }

.section { display:flex; flex-direction:column; gap: var(--s-4); }
.stack { display:flex; flex-direction:column; }
.row { display:flex; align-items:center; gap: var(--s-3); }
.row-wrap { flex-wrap:wrap; }
.divider { height:1px; background: var(--linea); border:0; margin: var(--s-2) 0; }

/* banners */
.banner {
  display:flex; gap: var(--s-3); padding: var(--s-4); border-radius: var(--r-md);
  font-size: var(--fs-sm); align-items:flex-start;
}
.banner-info { background: var(--st-libe-bg); color: var(--st-libe-fg); }
.banner-warn { background: var(--st-pend-bg); color: var(--st-pend-fg); }
.banner-ok { background: var(--verde-50); color: var(--verde-700); }
.banner b { font-weight: var(--fw-bold); }

/* stat cards */
.stat { padding: var(--s-4); border-radius: var(--r-md); background: var(--panel); border:1px solid var(--linea); }
.stat .v { font-size: var(--fs-2xl); font-weight: var(--fw-bold); letter-spacing:-.02em; line-height:1; }
.stat .k { font-size:12px; color: var(--tinta-50); font-weight: var(--fw-semi); margin-top:6px; text-transform:uppercase; letter-spacing:.03em; }
.grid-2 { display:grid; grid-template-columns: repeat(2,1fr); gap: var(--s-3); }
.grid-3 { display:grid; grid-template-columns: repeat(3,1fr); gap: var(--s-3); }

/* sheet / modal móvil */
.scrim {
  position:fixed; inset:0; z-index:60; background: rgba(15,25,18,.45);
  display:flex; align-items:flex-end; justify-content:center;
  animation: scrimFade .24s var(--ease-out) both;
}
@keyframes scrimFade {
  from { background: rgba(15,25,18,0); }
  to   { background: rgba(15,25,18,.45); }
}
.sheet {
  width:100%; max-width: 560px; background: var(--panel);
  border-radius: var(--r-xl) var(--r-xl) 0 0; box-shadow: var(--sh-lg);
  max-height: 92dvh; overflow-y:auto; padding: var(--s-5) var(--s-5) calc(var(--s-6) + env(safe-area-inset-bottom));
  animation: sheetUp .36s var(--ease-spring) both;
}
@keyframes sheetUp {
  0%   { transform: translateY(32px); opacity: 0; }
  60%  { transform: translateY(-3px); opacity: 1; }
  100% { transform: none; opacity: 1; }
}
.sheet-grab { width:42px; height:5px; border-radius:3px; background: var(--linea-fuerte); margin:0 auto var(--s-4); }

@media (min-width:600px){ .scrim { align-items:center; } .sheet { border-radius: var(--r-xl); } }

/* ---------- responsive: desktop dos zonas ---------- */
.split { display:flex; flex-direction:column; gap: var(--s-4); }

@media (min-width: 1024px) {
  .sidebar { display:flex; }
  .topbar.mobile-only { display:none; }
  .bottomnav { display:none; }
  .fab-org { display:none; }
  .with-bottomnav { padding-bottom: var(--s-7); }
  .content-pad { padding: var(--s-6) var(--s-7); }

  /* detalle: lista izquierda + detalle derecha */
  .split { display:grid; grid-template-columns: minmax(320px, 380px) 1fr; gap: var(--s-6); align-items:start; }
  .split-list { position:sticky; top: var(--s-6); }
  .list-grid { display:grid; gap: var(--s-4); grid-template-columns: repeat(auto-fill, minmax(300px,1fr)); }
  .spot-grid { grid-template-columns: repeat(auto-fill, minmax(80px,1fr)); }
  [data-density="comfy"] .spot-grid { grid-template-columns: repeat(auto-fill, minmax(96px,1fr)); }
  [data-density="compact"] .spot-grid { grid-template-columns: repeat(auto-fill, minmax(66px,1fr)); }
}

@media (min-width: 1280px) {
  .content-pad { max-width: 1240px; }
}

/* desktop topbar interior (título de página) */
.deskbar { display:none; }
@media (min-width:1024px){
  .deskbar {
    display:flex; align-items:center; gap: var(--s-4);
    padding: var(--s-5) var(--s-7) 0; max-width:1240px; margin:0 auto; width:100%;
  }
}

/* ============================================================
   AUTH — pantalla inmersiva (fondo cinematográfico + tarjeta)
   ============================================================ */
.auth-stage {
  position: relative; min-height: 100dvh; overflow: hidden;
  display: flex; flex-direction: column; background: var(--verde-900);
}
.auth-stage-bg {
  position: absolute; inset: 0; width: 100%; height: 100%;
  object-fit: cover; object-position: center 60%;
  pointer-events: none; z-index: 0;
}
.auth-stage-tint {
  position: absolute; inset: 0; pointer-events: none;
  background:
    radial-gradient(120% 90% at 50% -12%, rgba(0,0,0,.5), transparent 52%),
    linear-gradient(180deg, rgba(7,28,16,.62) 0%, rgba(7,28,16,.20) 28%, rgba(7,28,16,.16) 64%, rgba(5,20,12,.42) 100%);
}

.auth-topbar {
  position: relative; z-index: 2;
  display: flex; align-items: center; justify-content: space-between;
  padding: 22px clamp(20px, 5vw, 56px);
}
.auth-topbar-locale {
  display: inline-flex; align-items: center; gap: 8px;
  color: rgba(255,255,255,.82); font-size: 13px; font-weight: 650;
  padding: 8px 14px; border-radius: var(--r-pill);
  background: rgba(255,255,255,.08); border: 1px solid rgba(255,255,255,.16);
  backdrop-filter: blur(8px); white-space: nowrap;
}

.auth-main {
  position: relative; z-index: 2; flex: 1;
  display: flex; align-items: center; justify-content: flex-start;
  padding: 6px clamp(20px, 5vw, 40px) 40px; overflow-y: auto;
}
.auth-col {
  width: 100%; max-width: 430px; margin: 0 auto;
  display: flex; flex-direction: column; align-items: center; gap: 20px;
}
.auth-lede { text-align: center; }
.auth-eyebrow {
  display: inline-flex; align-items: center; gap: 8px;
  color: rgba(255,255,255,.88); font-size: 12.5px; font-weight: 700;
  letter-spacing: .04em; text-transform: uppercase;
  padding: 6px 13px; border-radius: var(--r-pill); white-space: nowrap;
  background: rgba(255,255,255,.08); border: 1px solid rgba(255,255,255,.16);
  backdrop-filter: blur(8px);
}
.auth-eyebrow-dot {
  width: 7px; height: 7px; border-radius: 50%;
  background: var(--verde-400); box-shadow: 0 0 0 3px rgba(56,172,97,.3);
}
.auth-title {
  margin: 16px 0 0; color: #fff; text-wrap: balance;
  font-size: clamp(28px, 4vw, 40px); font-weight: 800;
  letter-spacing: -.025em; line-height: 1.06;
  text-shadow: 0 2px 22px rgba(0,0,0,.5);
}
.auth-title em { font-style: normal; color: var(--verde-400); }

.auth-card {
  width: 100%;
  background: rgba(255,255,255,.97);
  backdrop-filter: blur(18px) saturate(1.1);
  border: 1px solid rgba(255,255,255,.7);
  border-radius: 26px; padding: 26px 26px 28px;
  box-shadow: 0 36px 80px -28px rgba(0,0,0,.7), inset 0 1px 0 rgba(255,255,255,.7);
}
.auth-seg {
  position: relative; display: grid; grid-template-columns: 1fr 1fr;
  padding: 4px; border-radius: 15px;
  background: var(--lienzo-2); border: 1px solid rgba(13,61,32,.07);
}
.auth-seg-btn {
  position: relative; z-index: 1; border: 0; background: transparent;
  padding: 11px 8px; border-radius: 11px; cursor: pointer;
  font-family: inherit; font-size: 14.5px; font-weight: 750; letter-spacing: -.01em;
  color: var(--tinta-50); transition: color .22s ease, background .28s ease, box-shadow .28s ease;
}
.auth-seg-btn.is-on {
  color: #fff;
  background: linear-gradient(160deg, var(--verde-500), var(--verde-700));
  box-shadow: 0 6px 16px rgba(21,98,52,.4);
}
.auth-card-h { margin: 0; font-size: 26px; font-weight: 800; letter-spacing: -.02em; text-align: center; }
.auth-card-sub { margin: 14px 0 0; text-align: center; color: var(--tinta-50); font-size: 14.5px; }
.auth-card-foot { text-align: center; margin: 22px 0 0; font-size: 14px; color: var(--tinta-50); }

.auth-trust { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; }
.auth-trust-pill {
  display: inline-flex; align-items: center; gap: 7px;
  padding: 6px 13px 6px 6px; border-radius: var(--r-pill);
  background: rgba(255,255,255,.10); border: 1px solid rgba(255,255,255,.20);
  color: #fff; font-size: 13px; font-weight: 700; letter-spacing: -.005em;
  backdrop-filter: blur(6px);
}

/* Badge circular brillante (estilo botón referencia) */
.badge-ico {
  position: relative; flex: none;
  width: 26px; height: 26px; border-radius: 50%;
  display: grid; place-items: center; color: #fff;
  background: linear-gradient(158deg, var(--verde-400), var(--verde-600) 58%, var(--verde-700));
  border: 1.5px solid rgba(255,255,255,.92);
  box-shadow: 0 2px 6px rgba(0,0,0,.32), inset 0 -2px 4px rgba(0,0,0,.18);
}
.badge-ico::after {
  content: ""; position: absolute; left: 3px; right: 3px; top: 2px; height: 44%;
  border-radius: 50%; pointer-events: none;
  background: linear-gradient(to bottom, rgba(255,255,255,.6), rgba(255,255,255,0));
}
.badge-ico svg { position: relative; z-index: 1; }

@media (prefers-reduced-motion: reduce) {
  .auth-stage-bg { animation: none; }
}
@media (max-width: 560px) {
  .auth-card { padding: 26px 20px; }
  .auth-title { margin-top: 12px; }
}

/* hero-fill: animación de cupos llenándose */
.hero-fill { display: flex; flex-direction: column; gap: 14px; }
.hero-fill-grid {
  display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px;
  max-width: 360px;
}
.hf-tile {
  position: relative; aspect-ratio: 1 / 1; border-radius: 14px;
  display: grid; place-items: center;
  font-weight: 800; font-size: 17px; letter-spacing: -.01em;
  border: 1.5px solid rgba(255,255,255,.22);
  background: rgba(255,255,255,.05); color: rgba(255,255,255,.55);
  transition:
    background .4s cubic-bezier(.2,.8,.2,1),
    border-color .4s cubic-bezier(.2,.8,.2,1),
    color .35s ease,
    transform .4s cubic-bezier(.2,.8,.2,1),
    box-shadow .4s ease;
  will-change: transform;
}
.hf-tile.is-pendiente {
  background: rgba(255, 210, 110, .14);
  border-color: rgba(255, 215, 130, .65);
  border-style: dashed;
  color: rgba(255, 230, 160, .98);
  transform: scale(1.04);
}
.hf-tile.is-pagado {
  background: #ffffff;
  border-color: #ffffff;
  color: var(--verde-700);
  box-shadow: 0 8px 22px rgba(0,0,0,.18), 0 0 0 1px rgba(255,255,255,.3);
  transform: scale(.97);
}
.hf-num { transition: opacity .18s ease; }
.hf-check {
  position: absolute; opacity: 0; transform: scale(.5);
  transition: opacity .22s ease .05s, transform .28s cubic-bezier(.2,.8,.2,1) .05s;
}
.hf-tile.is-pagado .hf-num { opacity: 0; }
.hf-tile.is-pagado .hf-check { opacity: 1; transform: scale(1); }

.hero-fill-grid.is-armada .hf-tile {
  animation: hf-armada-pulse .85s cubic-bezier(.2,.8,.2,1) both;
  animation-delay: calc(var(--i, 0) * 35ms);
}
@keyframes hf-armada-pulse {
  0%   { box-shadow: 0 8px 22px rgba(0,0,0,.18), 0 0 0 0 rgba(255,255,255,.55); }
  60%  { box-shadow: 0 8px 22px rgba(0,0,0,.18), 0 0 0 12px rgba(255,255,255,0); transform: scale(1.03); }
  100% { box-shadow: 0 8px 22px rgba(0,0,0,.18), 0 0 0 0 rgba(255,255,255,0); transform: scale(.97); }
}

.hero-fill-foot {
  display: flex; align-items: center; gap: 14px;
  max-width: 360px;
}
.hero-fill-track {
  flex: 1; height: 8px; border-radius: 999px; overflow: hidden;
  background: rgba(255,255,255,.16);
}
.hero-fill-track span {
  display: block; height: 100%;
  background: linear-gradient(90deg, var(--naranjo-400), #ffffff);
  transition: width .35s cubic-bezier(.2,.8,.2,1);
}
.hero-fill-cap {
  font-size: 13px; font-weight: 700; color: rgba(255,255,255,.92);
  display: inline-flex; align-items: center; gap: 6px; white-space: nowrap;
  letter-spacing: -.005em;
}
.hero-fill-cap b { font-weight: 800; color: #fff; font-variant-numeric: tabular-nums; }
.hero-fill-cap.is-armada { color: #fff; }

/* Versión compacta (mobile sobre fondo claro) */
.hero-fill.hf-compact { gap: 10px; margin: 4px 0 22px; }
.hero-fill.hf-compact .hero-fill-grid {
  grid-template-columns: repeat(8, 1fr);
  max-width: 100%;
  gap: 6px;
}
.hero-fill.hf-compact .hf-tile {
  font-size: 12px; border-radius: 9px;
  background: var(--panel); border: 1.5px solid var(--linea); color: var(--tinta-50);
  box-shadow: none;
}
.hero-fill.hf-compact .hf-tile.is-pendiente {
  background: var(--st-pend-bg); border-color: var(--st-pend-bd);
  color: var(--st-pend-fg); border-style: dashed; transform: scale(1.05);
}
.hero-fill.hf-compact .hf-tile.is-pagado {
  background: var(--verde-600); border-color: var(--verde-600); color: #fff;
  box-shadow: 0 4px 10px rgba(27,122,61,.22), 0 0 0 1px rgba(255,255,255,.05);
  transform: scale(.97);
}
.hero-fill.hf-compact .hero-fill-foot { max-width: 100%; }
.hero-fill.hf-compact .hero-fill-track { background: var(--lienzo-2); border: 1px solid var(--linea); }
.hero-fill.hf-compact .hero-fill-track span {
  background: linear-gradient(90deg, var(--naranjo-500), var(--verde-600));
}
.hero-fill.hf-compact .hero-fill-cap { color: var(--tinta-70); }
.hero-fill.hf-compact .hero-fill-cap b { color: var(--verde-700); }
.hero-fill.hf-compact .hero-fill-cap.is-armada { color: var(--verde-700); }

@media (max-width: 1023.98px) {
  .auth-hero { display: none !important; }
}

/* hide-on rules — SOLO ocultan; nunca fuerzan display (no rompen flex/grid) */
.only-mobile { }
.only-desktop { }

}
